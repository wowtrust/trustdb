name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-hygiene:
    name: Repository hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check whitespace
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            git diff --check "$PR_BASE_SHA" "$PR_HEAD_SHA"
          elif git rev-parse HEAD^1 >/dev/null 2>&1; then
            git diff --check HEAD^1 HEAD
          else
            git diff-tree --check --no-commit-id --root -r HEAD
          fi

      - name: Keep local draft docs out of git
        shell: bash
        run: |
          tracked_docs="$(git ls-files 'doc/**' 'docs/**' | grep -Ev '^docs/performance/' || true)"
          if [ -n "$tracked_docs" ]; then
            echo "::error::doc/ and docs/ are local draft directories and must not be committed, except docs/performance/."
            echo "$tracked_docs"
            exit 1
          fi

  backend:
    name: Backend unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Download dependencies
        run: go mod download

      - name: Verify module dependencies
        run: go mod verify

      - name: Check module tidiness
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Run go vet
        run: go vet ./...

      - name: Run unit tests
        run: go test -mod=readonly ./...

  backend-race:
    name: Backend race tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run race tests
        run: go test -race -mod=readonly ./...

  backend-integration:
    name: Backend integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run integration tests
        run: go test -count=1 -mod=readonly -tags=integration ./...

  backend-e2e:
    name: Backend e2e tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run e2e tests
        run: go test -count=1 -mod=readonly -tags=e2e ./...

  backend-bench-smoke:
    name: Backend bench smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TRUSTDB_BENCH_MIN_CANDIDATE_THROUGHPUT: "1"
      TRUSTDB_BENCH_MAX_THROUGHPUT_REGRESSION_PCT: "80"
      TRUSTDB_BENCH_MAX_DURATION_REGRESSION_PCT: "200"
      TRUSTDB_BENCH_MAX_SUBMIT_P95_REGRESSION_PCT: "0"
      TRUSTDB_BENCH_MAX_CANDIDATE_SUBMIT_P95_MS: "0"
      TRUSTDB_BENCH_MAX_CANDIDATE_FAILED: "0"
      TRUSTDB_BENCH_MAX_CANDIDATE_BATCH_ERRORS: "0"
      TRUSTDB_BENCH_MAX_CANDIDATE_QUERY_FAILED: "0"
      TRUSTDB_BENCH_MAX_CANDIDATE_PROOF_TIMEOUTS: "0"
      TRUSTDB_BENCH_MAX_CANDIDATE_PROOF_FAILED: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run bench smoke artifact flow
        env:
          TRUSTDB_BENCH_ARTIFACT_DIR: ${{ github.workspace }}/bench-smoke-artifacts
        run: go test -count=1 -mod=readonly -tags=e2e ./cmd/trustdb -run TestBenchCIArtifactFlow

      - name: Run global log history proof bench smoke
        env:
          TRUSTDB_BENCH_ARTIFACT_DIR: ${{ github.workspace }}/bench-smoke-artifacts
          TRUSTDB_GLOBAL_LOG_BENCH_TREE_SIZE: "2048"
        run: |
          mkdir -p "$TRUSTDB_BENCH_ARTIFACT_DIR"
          go test -count=1 -mod=readonly ./internal/globallog \
            -run TestGlobalLogHistoryProofReadCountsStayLogarithmic \
            -bench BenchmarkGlobalLogHistoryProofsLargeTree \
            -benchmem \
            -benchtime=1x | tee "$TRUSTDB_BENCH_ARTIFACT_DIR/global-log-history-bench.txt"

      - name: Write bench summary
        shell: bash
        env:
          TRUSTDB_BENCH_ARTIFACT_DIR: ${{ github.workspace }}/bench-smoke-artifacts
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          root = Path(os.environ["TRUSTDB_BENCH_ARTIFACT_DIR"])
          compare_path = root / "compare.json"
          matrix_path = root / "matrix" / "matrix-summary.json"
          global_log_bench_path = root / "global-log-history-bench.txt"
          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])

          lines = ["## Bench Smoke"]
          submit_p95_regression = os.environ.get("TRUSTDB_BENCH_MAX_SUBMIT_P95_REGRESSION_PCT", "").strip()
          submit_p95_regression_label = "disabled" if submit_p95_regression in ("", "0") else f"{submit_p95_regression}%"
          if compare_path.exists():
              compare = json.loads(compare_path.read_text(encoding="utf-8"))
              baseline = compare.get("baseline", {})
              candidate = compare.get("candidate", {})
              summary = compare.get("summary", {})
              assertions = compare.get("assertions") or {}
              lines.extend([
                  "",
                  f"- baseline throughput: {baseline.get('throughput_per_sec', 0):.2f} ops/s",
                  f"- candidate throughput: {candidate.get('throughput_per_sec', 0):.2f} ops/s",
                  f"- throughput delta: {summary.get('throughput_per_sec', {}).get('delta', 0):.2f} ops/s",
                  f"- candidate duration: {candidate.get('duration_seconds', 0):.3f} s",
                  f"- submit p95 delta: {summary.get('submit_p95_ms', {}).get('delta', 0):.2f} ms",
                  f"- candidate failed: {candidate.get('failed', 0)}",
                  f"- assertions passed: {assertions.get('passed', False)}",
                  f"- assertion failures: {assertions.get('failed_count', 0)}",
              ])
              lines.extend([
                  "",
                  "### Gate thresholds",
                  f"- min candidate throughput: {os.environ.get('TRUSTDB_BENCH_MIN_CANDIDATE_THROUGHPUT', '')} ops/s",
                  f"- max throughput regression: {os.environ.get('TRUSTDB_BENCH_MAX_THROUGHPUT_REGRESSION_PCT', '')}%",
                  f"- max duration regression: {os.environ.get('TRUSTDB_BENCH_MAX_DURATION_REGRESSION_PCT', '')}%",
                  f"- max submit p95 regression: {submit_p95_regression_label}",
                  f"- max candidate submit p95: {os.environ.get('TRUSTDB_BENCH_MAX_CANDIDATE_SUBMIT_P95_MS', '')} ms",
                  f"- max candidate failed: {os.environ.get('TRUSTDB_BENCH_MAX_CANDIDATE_FAILED', '')}",
                  f"- max candidate batch errors: {os.environ.get('TRUSTDB_BENCH_MAX_CANDIDATE_BATCH_ERRORS', '')}",
                  f"- max candidate query failed: {os.environ.get('TRUSTDB_BENCH_MAX_CANDIDATE_QUERY_FAILED', '')}",
                  f"- max candidate proof timeouts: {os.environ.get('TRUSTDB_BENCH_MAX_CANDIDATE_PROOF_TIMEOUTS', '')}",
                  f"- max candidate proof failed: {os.environ.get('TRUSTDB_BENCH_MAX_CANDIDATE_PROOF_FAILED', '')}",
              ])
          if matrix_path.exists():
              matrix = json.loads(matrix_path.read_text(encoding="utf-8"))
              summary = matrix.get("summary", {})
              lines.extend([
                  "",
                  "### Matrix",
                  f"- case count: {summary.get('case_count', 0)}",
                  f"- total submitted: {summary.get('total_submitted', 0)}",
                  f"- average throughput: {summary.get('average_throughput_per_sec', 0):.2f} ops/s",
                  f"- fastest case: {summary.get('fastest_case_name', '')}",
              ])
          if global_log_bench_path.exists():
              bench_lines = [
                  line.strip()
                  for line in global_log_bench_path.read_text(encoding="utf-8").splitlines()
                  if line.startswith("BenchmarkGlobalLogHistoryProofsLargeTree/")
              ]
              lines.extend([
                  "",
                  "### Global Log History",
                  f"- benchmark smoke lines: {len(bench_lines)}",
                  f"- artifact: {global_log_bench_path.name}",
              ])
              for line in bench_lines[:6]:
                  fields = line.split()
                  if len(fields) >= 5:
                      lines.append(f"- {fields[0]}: {fields[2]} ns/op, {fields[4]} B/op")
          summary_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Upload bench smoke artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: trustdb-bench-smoke
          path: ${{ github.workspace }}/bench-smoke-artifacts
          if-no-files-found: error

  desktop-go:
    name: Desktop Go tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: clients/desktop/frontend/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: clients/desktop/go.mod
          cache-dependency-path: clients/desktop/go.sum

      - name: Build embedded frontend assets
        working-directory: clients/desktop/frontend
        run: |
          npm ci
          npm run build

      - name: Download dependencies
        working-directory: clients/desktop
        run: go mod download

      - name: Verify module dependencies
        working-directory: clients/desktop
        run: go mod verify

      - name: Check module tidiness
        working-directory: clients/desktop
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Run go vet
        working-directory: clients/desktop
        run: go vet ./...

      - name: Run desktop Go tests
        working-directory: clients/desktop
        run: go test -mod=readonly ./...

  desktop-frontend:
    name: Desktop frontend build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: clients/desktop/frontend/package-lock.json

      - name: Install dependencies
        working-directory: clients/desktop/frontend
        run: npm ci

      - name: Build frontend
        working-directory: clients/desktop/frontend
        run: npm run build

  web-admin-frontend:
    name: Admin web frontend build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: clients/web/package-lock.json

      - name: Install dependencies
        working-directory: clients/web
        run: npm ci

      - name: Install Playwright browsers
        working-directory: clients/web
        run: npx playwright install --with-deps chromium

      - name: Run admin web unit and component tests
        working-directory: clients/web
        run: npm run test:unit

      - name: Run admin web e2e tests
        working-directory: clients/web
        run: npm run test:e2e

      - name: Build admin web
        working-directory: clients/web
        run: npm run build

  website-frontend:
    name: Official website build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Build official website
        working-directory: website
        run: npm run build
