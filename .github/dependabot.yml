version: 2

updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    rebase-strategy: auto
    labels:
      - dependencies
      - go
    commit-message:
      prefix: "fix(deps)"
    allow:
      - dependency-type: all
    ignore:
      # Dependabot misclassifies this TiKV submodule pseudo-version as an
      # upgrade to the unrelated v3.0.0-alpha+incompatible parent-module tag.
      - dependency-name: github.com/tikv/pd/client
        update-types:
          - version-update:semver-major
    groups:
      security-patches:
        applies-to: security-updates
        patterns:
          - "*"
      routine-minor-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: gomod
    directory: /clients/desktop
    schedule:
      interval: weekly
      day: monday
      time: "03:15"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    rebase-strategy: auto
    labels:
      - dependencies
      - go
    commit-message:
      prefix: "fix(deps)"
    allow:
      - dependency-type: all
    ignore:
      # Keep patch/minor and security fixes eligible; only the invalid major
      # candidate makes the Go module graph unresolvable.
      - dependency-name: github.com/tikv/pd/client
        update-types:
          - version-update:semver-major
    groups:
      security-patches:
        applies-to: security-updates
        patterns:
          - "*"
      routine-minor-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /clients/web
    schedule:
      interval: weekly
      day: monday
      time: "03:30"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    rebase-strategy: auto
    versioning-strategy: increase-if-necessary
    labels:
      - dependencies
    commit-message:
      prefix: "fix(deps)"
    allow:
      - dependency-type: all
    groups:
      security-patches:
        applies-to: security-updates
        patterns:
          - "*"
      routine-minor-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /clients/desktop/frontend
    schedule:
      interval: weekly
      day: monday
      time: "03:45"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    rebase-strategy: auto
    versioning-strategy: increase-if-necessary
    labels:
      - dependencies
    commit-message:
      prefix: "fix(deps)"
    allow:
      - dependency-type: all
    groups:
      security-patches:
        applies-to: security-updates
        patterns:
          - "*"
      routine-minor-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - minor
          - patch
